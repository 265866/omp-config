providers:
  cliproxy:
    baseUrl: https://cliproxyapi.colton.run/v1
    api: openai-completions
    apiKey: CLIPROXY_API_KEY
    authHeader: true
    models:
      - id: gpt-5.5
        name: GPT-5.5
        api: openai-completions
        reasoning: true
        thinking:
          mode: effort
          efforts: [low, medium, high, xhigh]
        input: [text, image]
        cost:
          input: 5
          output: 30
          cacheRead: 0.5
          cacheWrite: 0
        contextWindow: 272000
        maxTokens: 200000
        compat:
          supportsStore: false
          supportsDeveloperRole: false
          supportsReasoningEffort: true
          thinkingFormat: openai
          maxTokensField: max_completion_tokens
      - id: gpt-5.3-codex-spark
        name: GPT-5.3-Codex-Spark
        api: openai-completions
        reasoning: false
        input: [text]
        cost:
          input: 0.6
          output: 4.5
          cacheRead: 0.06
          cacheWrite: 0
        contextWindow: 128000
        maxTokens: 60000
        compat:
          supportsStore: false
          supportsDeveloperRole: false
          supportsReasoningEffort: false
          supportsForcedToolChoice: false
          thinkingFormat: openai
          maxTokensField: max_completion_tokens
